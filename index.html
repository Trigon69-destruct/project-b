<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:white;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background: radial-gradient(circle at center, #0f2027, #000);
}
.bg::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(255,105,180,0.15), rgba(58,134,255,0.15), transparent 70%);
  animation:move 12s infinite alternate;
}
@keyframes move {
  from {transform:translate(-20%,-20%);}
  to {transform:translate(20%,20%);}
}

/* HEART PARTICLES */
.heart {
  position:fixed;
  color:#ff4d6d;
  font-size:12px;
  animation:float 8s linear infinite;
  opacity:0.6;
}
@keyframes float {
  from {transform:translateY(100vh);}
  to {transform:translateY(-10vh);}
}

/* LOCK */
#lock {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  padding:12px;
  border-radius:25px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  text-align:center;
}

button {
  margin-top:15px;
  padding:12px 28px;
  border-radius:30px;
  border:none;
  background:linear-gradient(45deg,#ff4d6d,#3a86ff);
  color:white;
  font-weight:500;
}

/* TITLE */
#title {
  display:none;
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-family:'Great Vibes';
  font-size:2.2rem;
  opacity:0;
  transform:scale(0.8);
  transition:1.5s;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- LOCK -->
<div id="lock">
  <h2>Enter your special date ❤️</h2>
  <input type="password" id="pass">
  <button onclick="unlock()">Unlock ❤️</button>
</div>

<!-- TITLE -->
<div id="title">Happy Birthday my sweet little baby 😘❤️</div>

<audio id="music"></audio>

<script>

let music = document.getElementById("music");

/* HEART PARTICLES */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),8000);
},400);

/* UNLOCK */
function unlock(){
  let val=document.getElementById("pass").value;

  if(val==="1704"){
    document.getElementById("lock").style.display="none";

    let t=document.getElementById("title");
    t.style.display="block";

    setTimeout(()=>{
      t.style.opacity=1;
      t.style.transform="scale(1)";
    },200);

    startMusic();
  } else {
    alert("Wrong date 😝");
  }
}

/* MUSIC FLOW */
function startMusic(){
  music.src="birthday.mp3";
  music.volume=0.5;
  music.play();

  setTimeout(()=>{
    music.src="song1.mp3";
    music.loop=true;
    music.volume=0.3;
    music.play();
  },15000);
}

</script>

</body>
</html>
