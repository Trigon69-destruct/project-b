<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #ffd1e6 0%, #f7a8c9 60%, #e07aa3 100%);
}

/* BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* HEARTS */
.heart {
  position: absolute;
  width: 8px;
  height: 8px;
  background: rgba(255,105,180,0.35);
  transform: rotate(45deg);
  animation: floatUp linear infinite;
}

.heart::before, .heart::after {
  content: "";
  position: absolute;
  width: 8px;
  height: 8px;
  background: rgba(255,105,180,0.35);
  border-radius: 50%;
}

.heart::before { top: -4px; }
.heart::after { left: -4px; }

@keyframes floatUp {
  from { transform: translateY(100vh) rotate(45deg); }
  to { transform: translateY(-10vh) rotate(45deg); }
}

/* STARS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.5;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 0.8; }
}

/* LOCK */
#lock {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.15);
  backdrop-filter: blur(8px);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 2;
}

input {
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  text-align: center;
}

button {
  margin-top: 15px;
  padding: 12px 30px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  color: white;
  cursor: pointer;
}

/* TITLE */
#title {
  position: absolute;
  top: 45%;
  width: 100%;
  text-align: center;
  font-family: 'Great Vibes';
  font-size: 32px;
  opacity: 0;
  transform: translateY(20px);
  transition: 2s ease;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<!-- LOCK SCREEN -->
<div id="lock">
  <h2>Enter your special date ❤️</h2>
  <input id="pass">
  <button onclick="unlock()">Unlock ❤️</button>
</div>

<!-- TITLE -->
<div id="title">
  Happy Birthday my sweet little baby 😘❤️
</div>

<!-- AUDIO -->
<audio id="bday" src="birthday.mp3"></audio>
<audio id="bgm" src="song1.mp3" loop></audio>

<script>

/* PARTICLES (CONTROLLED) */
function createParticles(){
  const bg = document.getElementById('bg');

  for(let i=0;i<15;i++){
    let h=document.createElement('div');
    h.className='heart';
    h.style.left=Math.random()*100+'vw';
    h.style.animationDuration=(10+Math.random()*5)+'s';
    bg.appendChild(h);
  }

  for(let i=0;i<25;i++){
    let s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'vw';
    s.style.top=Math.random()*100+'vh';
    bg.appendChild(s);
  }
}

createParticles();

/* UNLOCK FLOW */
function unlock(){
  let val=document.getElementById('pass').value;

  if(val==="1704"){

    document.getElementById('lock').style.display="none";

    let title=document.getElementById('title');
    title.style.opacity=1;
    title.style.transform="translateY(0)";

    let bday=document.getElementById('bday');
    let bgm=document.getElementById('bgm');

    /* START BDAY MUSIC */
    bday.volume=0.6;
    bday.play();

    /* AFTER 15s → TRANSITION */
    setTimeout(()=>{

      let fadeOut=setInterval(()=>{
        if(bday.volume>0.05){
          bday.volume-=0.05;
        } else {
          clearInterval(fadeOut);
          bday.pause();

          /* START LOOP MUSIC */
          bgm.volume=0;
          bgm.play();

          let fadeIn=setInterval(()=>{
            if(bgm.volume<0.3){
              bgm.volume+=0.03;
            } else {
              clearInterval(fadeIn);
            }
          },200);
        }
      },200);

    },15000);

  } else {
    alert("Wrong date");
  }
}

</script>

</body>
</html>
