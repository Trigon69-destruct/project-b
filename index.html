<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Sweetu ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Playfair Display', serif;
  background: black;
  color: white;
  text-align: center;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center, #3a86ff, #000);
  opacity: 0.25;
  z-index: -1;
}

#lock {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#main {
  display: none;
  padding: 30px;
}

h1 {
  font-size: 2.5rem;
}

#slide {
  width: 80%;
  max-width: 260px;
  border-radius: 15px;
  margin-top: 20px;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #3a86ff;
  color: white;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="lock">
  <h2>Enter our special date ❤️</h2>
  <input type="password" id="pass">
  <button onclick="unlock()">Enter</button>
</div>

<div id="main">
  <h1>Happy Birthday ❤️</h1>
  <p id="typeText"></p>
  <img id="slide" src="image1.jpg">
  <br>
  <button onclick="secret()">Don’t click 😏</button>
</div>

<div id="secretPage" style="display:none;">
  <h1>You found it ❤️</h1>
  <p>Your final message here...</p>
</div>

<audio id="music"></audio>

<script>
function unlock() {
  let input = document.getElementById("pass").value;

  if(input === "1704") {
    document.getElementById("lock").style.display = "none";
    document.getElementById("main").style.display = "block";
    fadeMusic();
  } else {
    alert("Wrong date 😝");
  }
}

function fadeMusic() {
  let music = document.getElementById("music");

  music.src = "song1.mp3";
  music.volume = 0;
  music.play().catch(()=>{});

  let vol = 0;
  let fade = setInterval(() => {
    if(vol < 1) {
      vol += 0.05;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);
}

function secret() {
  document.getElementById("main").style.display = "none";
  document.getElementById("secretPage").style.display = "block";
}
</script>

</body>
</html>
