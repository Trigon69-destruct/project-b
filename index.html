<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffd6e7, #ffb6d9);
}

/* BACKGROUND LAYERS */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

.heart {
  position: absolute;
  width: 12px;
  height: 12px;
  background: pink;
  transform: rotate(45deg);
  opacity: 0.3;
  animation: floatUp linear infinite;
}

.heart::before, .heart::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: pink;
  border-radius: 50%;
}

.heart::before { top: -6px; left: 0; }
.heart::after { left: -6px; top: 0; }

@keyframes floatUp {
  from { transform: translateY(100vh) rotate(45deg); }
  to { transform: translateY(-10vh) rotate(45deg); }
}

/* STARS */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.6;
  animation: twinkle 3s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* CENTER BOX */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* INPUT */
input {
  padding: 12px;
  border-radius: 20px;
  border: none;
  outline: none;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.2);
  color: #fff;
  text-align: center;
}

/* GLASS BUTTON */
button {
  margin-top: 15px;
  padding: 12px 30px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: rgba(255,255,255,0.25);
}

/* TEXT SCREEN */
#message {
  font-family: 'Great Vibes', cursive;
  font-size: 32px;
  opacity: 0;
  transition: 2s;
}

/* MAIN STORY */
.story {
  display: none;
  padding: 30px;
  text-align: center;
  color: #fff;
}

.story img {
  width: 80%;
  border-radius: 15px;
  margin: 20px 0;
  opacity: 0;
  transform: scale(0.95);
  transition: 1.5s;
}

.story p {
  opacity: 0;
  transition: 1.5s;
}

/* DON'T CLICK BUTTON */
#dontClick {
  display: none;
  margin-top: 30px;
  background: rgba(255,0,0,0.2);
  border: 1px solid rgba(255,0,0,0.4);
}

/* FINAL MESSAGE */
#final {
  display: none;
  padding: 30px;
  text-align: center;
  color: white;
  font-size: 18px;
  opacity: 0;
  transition: 2s;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="center" id="lock">
  <h2>Enter your special date ❤️</h2>
  <input type="text" id="date">
  <br>
  <button onclick="unlock()">Unlock ❤️</button>
</div>

<div class="center" id="message">
  Happy Birthday my sweet little baby 😘❤️
</div>

<div class="story" id="story">
  <!-- Replace images + text -->
  <img src="image1.jpg">
  <p>We met when we least expected it…</p>

  <img src="image2.jpg">
  <p>And somehow you became everything…</p>

  <button id="dontClick" onclick="secret()">Don’t click</button>
</div>

<div id="final">
  <!-- Replace with your final message -->
  You are the most beautiful part of my life.
</div>

<!-- AUDIO -->
<audio id="bday" src="birthday.mp3"></audio>
<audio id="bgm" src="song1.mp3" loop></audio>

<script>

/* BACKGROUND GENERATOR */
function createBackground() {
  const bg = document.getElementById('bg');

  for(let i=0;i<25;i++){
    let h = document.createElement('div');
    h.className = 'heart';
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDuration = (6 + Math.random()*6) + 's';
    bg.appendChild(h);
  }

  for(let i=0;i<40;i++){
    let s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    bg.appendChild(s);
  }
}

createBackground();

/* FLOW */
function unlock(){
  document.getElementById('lock').style.display = 'none';

  let msg = document.getElementById('message');
  msg.style.opacity = 1;

  let bday = document.getElementById('bday');
  bday.play();

  setTimeout(()=>{
    msg.style.opacity = 0;
  }, 15000);

  setTimeout(()=>{
    startStory();
  }, 16500);
}

function startStory(){
  let story = document.getElementById('story');
  story.style.display = 'block';

  let imgs = story.querySelectorAll("img");
  let texts = story.querySelectorAll("p");

  imgs.forEach((img, i)=>{
    setTimeout(()=>{
      img.style.opacity = 1;
      img.style.transform = "scale(1)";
      texts[i].style.opacity = 1;
    }, i * 3000);
  });

  setTimeout(()=>{
    document.getElementById('dontClick').style.display = 'inline-block';
  }, imgs.length * 3000 + 1000);
}

function secret(){
  document.getElementById('story').style.display = 'none';

  let final = document.getElementById('final');
  final.style.display = 'block';

  let bgm = document.getElementById('bgm');
  bgm.play();

  setTimeout(()=>{
    final.style.opacity = 1;
  }, 500);
}

</script>

</body>
    </html>
