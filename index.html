<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#000;
  color:white;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
}

/* 🌸 ROMANTIC BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background: radial-gradient(circle at center, #1a0b14, #000);
}

.bg::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle,
    rgba(255,105,180,0.25),
    rgba(255,20,147,0.18),
    transparent 70%);
  animation:moveGlow 14s infinite alternate ease-in-out;
}

.bg::after {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle,
    rgba(255,182,193,0.15),
    transparent 70%);
  animation:moveGlow2 18s infinite alternate ease-in-out;
}

@keyframes moveGlow {
  from {transform:translate(-15%,-15%);}
  to {transform:translate(15%,15%);}
}
@keyframes moveGlow2 {
  from {transform:translate(10%,-10%);}
  to {transform:translate(-10%,10%);}
}

/* ❤️ HEART PARTICLES */
.heart {
  position:fixed;
  color:#ff6b81;
  animation:float 12s linear infinite;
  pointer-events:none;
}

@keyframes float {
  from {transform:translateY(100vh);}
  to {transform:translateY(-10vh);}
}

/* 🔐 LOCK SCREEN */
#lock {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

input {
  padding:12px;
  border-radius:25px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  text-align:center;
  outline:none;
}

/* 💎 GLASS BUTTON */
button {
  margin-top:18px;
  padding:14px 32px;
  border-radius:40px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  color:white;
  font-weight:500;
  box-shadow:0 0 25px rgba(255,105,180,0.15);
  transition:0.3s;
}
button:hover {
  transform:scale(1.05);
  box-shadow:0 0 35px rgba(255,105,180,0.35);
}

/* 🎬 TITLE */
#title {
  display:none;
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-family:'Great Vibes';
  font-size:2.3rem;
  opacity:0;
  transform:translateY(30px) scale(0.9);
  transition:2s ease;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- LOCK -->
<div id="lock">
  <h2>Enter your special date ❤️</h2>
  <input type="password" id="pass">
  <button onclick="unlock()">Unlock ❤️</button>
</div>

<!-- TITLE -->
<div id="title">Happy Birthday my sweet little baby 😘❤️</div>

<audio id="music"></audio>

<script>

let music = document.getElementById("music");

/* ❤️ PARTICLES */
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(8+Math.random()*6)+"px";
  h.style.opacity=Math.random()*0.4;
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),12000);
},900);

/* 🔓 UNLOCK */
function unlock(){
  let val=document.getElementById("pass").value;

  if(val==="1704"){
    document.getElementById("lock").style.display="none";

    let t=document.getElementById("title");
    t.style.display="block";

    setTimeout(()=>{
      t.style.opacity=1;
      t.style.transform="translateY(0) scale(1)";
    },300);

    startMusic();
  } else {
    alert("Wrong date 😝");
  }
}

/* 🎵 MUSIC FLOW (SMOOTH) */
function startMusic(){
  music.src="birthday.mp3";
  music.volume=0.5;
  music.play();

  setTimeout(()=>{
    let fadeOut=setInterval(()=>{
      if(music.volume>0.05){
        music.volume-=0.05;
      } else {
        clearInterval(fadeOut);

        music.src="song1.mp3";
        music.loop=true;
        music.volume=0;
        music.play();

        let fadeIn=setInterval(()=>{
          if(music.volume<0.3){
            music.volume+=0.03;
          } else {
            clearInterval(fadeIn);
          }
        },200);
      }
    },200);
  },15000);
}

</script>

</body>
</html>
